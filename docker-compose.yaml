services:
  db:
    image: postgres:15-alpine
    container_name: sinan-postgres
    restart: always
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - DB_HOST=${DB_HOST}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - sinan_pg_data:/var/lib/postgresql/data
  pgadmin:
    image: dpage/pgadmin4:7.7
    container_name: sinan-pgadmin
    restart: always
    environment:
      - PGADMIN_DEFAULT_EMAIL=${PGADMIN_DEFAULT_EMAIL}
      - PGADMIN_DEFAULT_PASSWORD=${PGADMIN_DEFAULT_PASSWORD}
    ports:
      - "${PGADMIN_PORT}:80"
    depends_on:
      - db
volumes:
  sinan_pg_data:
