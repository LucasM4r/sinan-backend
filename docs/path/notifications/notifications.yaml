# ENDPOINT: /notifications

# --- GET METHOD ---
get:
  summary: Listar notificações no sistema SINAN.
  description: >
    Retorna uma lista com todas as notificações cadastradas no sistema, 
    contendo apenas os dados gerais (comuns a todos os agravos).
  tags:
    - Notificações (Geral)
  operationId: listarNotificacoes
  parameters:
    - $ref: "../components/parameters.yaml#/PageParam"
    - $ref: "../components/parameters.yaml#/PageSizeParam"
    - $ref: "../components/parameters.yaml#/SearchParam"
    - $ref: "../components/parameters.yaml#/StartDateParam"
    - $ref: "../components/parameters.yaml#/EndDateParam"
    - $ref: "../components/parameters.yaml#/DiseaseIDParam"
    - $ref: "../components/parameters.yaml#/PatientIDParam"
    - $ref: "../components/parameters.yaml#/UnitIDParam"
  responses:
    # --- SUCCESS RESPONSE ---
    "200":
      description: Lista de notificações retornada com sucesso (pode ser vazia).
      content:
        application/json:
          schema:
            $ref: "../components/schemas.yaml#/PaginatedNotificationList"
    # --- BAD REQUEST RESPONSE ---
    "400":
      $ref: "../components/errors.yaml#/responses/400"
    # --- UNAUTHORIZED ACCESS RESPONSE ---
    "401":
      $ref: "../components/errors.yaml#/responses/401"
    # --- INTERNAL SERVER ERROR RESPONSE ---
    "500":
      $ref: "../components/errors.yaml#/responses/500"
