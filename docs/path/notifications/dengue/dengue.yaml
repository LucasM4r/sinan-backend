# ENDPOINT: /notifications/dengue

# --- POST METHOD ---
post:
  summary: Criar notificação de Dengue/Chikungunya
  description: Registra uma nova notificação no sistema unindo os dados gerais de triagem com os dados clínicos específicos de Dengue e Chikungunya.
  operationId: criarNotificacaoDengue
  tags:
    - Notificações (Agravos Específicos)
  requestBody:
    description: Payload contendo os dados gerais e específicos do agravo.
    required: true
    content:
      application/json:
        schema:
          $ref: "../../components/schemas.yaml#/DengueCreateRequest"
  responses:
    # --- CREATED RESPONSE ---
    "201":
      description: Notificação criada com sucesso.
      content:
        application/json:
          schema:
            $ref: "../../components/schemas.yaml#/DengueNotificationResponse"
    # --- BAD REQUEST RESPONSE ---
    "400":
      $ref: "../../components/errors.yaml#/responses/400"
    # --- UNAUTHORIZED RESPONSE ---
    "401":
      $ref: "../../components/errors.yaml#/responses/401"
    # --- SERVER ERROR RESPONSE ---
    "500":
      $ref: "../../components/errors.yaml#/responses/500"
