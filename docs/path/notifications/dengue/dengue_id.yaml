# ENDPOINT: /notifications/dengue/{id}

# --- SHARED PARAMETERS ---
parameters:
  - name: id
    in: path
    required: true
    description: ID único da notificação base.
    schema:
      type: integer
      example: 1042

# --- GET METHOD ---
get:
  summary: Buscar detalhes da notificação de Dengue
  description: Retorna os dados completos (gerais + clínicos) de uma notificação específica.
  operationId: detalharDengue
  tags:
    - Notificações (Agravos Específicos)
  responses:
    # --- SUCCESS RESPONSE ---
    "200":
      description: Detalhes recuperados com sucesso.
      content:
        application/json:
          schema:
            $ref: "../../components/schemas.yaml#/DengueNotificationResponse"
    # --- BAD REQUEST ERROR RESPONSE ---
    "400":
      $ref: "../../components/errors.yaml#/responses/400"
    # --- UNAUTHORIZED ERROR RESPONSE ---
    "401":
      $ref: "../../components/errors.yaml#/responses/401"
    # --- NOT FOUND ERROR RESPONSE ---
    "404":
      $ref: "../../components/errors.yaml#/responses/404"
    # --- SERVER ERROR RESPONSE ---
    "500":
      $ref: "../../components/errors.yaml#/responses/500"

# --- PUT METHOD ---
put:
  summary: Atualizar notificação de Dengue
  description: Sobrescreve os dados de uma notificação existente.
  operationId: atualizarDengue
  tags:
    - Notificações (Agravos Específicos)
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: "../../components/schemas.yaml#/DengueCreateRequest"
  responses:
    # --- SUCCESS RESPONSE ---
    "200":
      description: Notificação atualizada com sucesso. Retorna os dados atualizados.
      content:
        application/json:
          schema:
            $ref: "../../components/schemas.yaml#/DengueNotificationResponse"
    # --- BAD REQUEST ERROR RESPONSE ---
    "400":
      $ref: "../../components/errors.yaml#/responses/400"
    # --- UNAUTHORIZED ERROR RESPONSE ---
    "401":
      $ref: "../../components/errors.yaml#/responses/401"
    # --- NOT FOUND ERROR RESPONSE ---
    "404":
      $ref: "../../components/errors.yaml#/responses/404"
    # --- SERVER ERROR RESPONSE ---
    "500":
      $ref: "../../components/errors.yaml#/responses/500"

# --- DELETE METHOD ---
delete:
  summary: Excluir notificação de Dengue
  description: Remove a notificação do sistema (ou marca como inativa/excluída logicamente).
  operationId: deletarDengue
  tags:
    - Notificações (Agravos Específicos)
  responses:
    # --- SUCCESS WITHOUT CONTENT RESPONSE ---
    "204":
      description: Notificação excluída com sucesso (Sem conteúdo de retorno).
    # --- BAD REQUEST ERROR RESPONSE ---
    "400":
      $ref: "../../components/errors.yaml#/responses/400"
    # --- UNAUTHORIZED ERROR RESPONSE ---
    "401":
      $ref: "../../components/errors.yaml#/responses/401"
    # --- NOT FOUND ERROR RESPONSE ---
    "404":
      $ref: "../../components/errors.yaml#/responses/404"
    # --- SERVER ERROR RESPONSE ---
    "500":
      $ref: "../../components/errors.yaml#/responses/500"
