# ENDPOINT: /notifications/dengue/{id}

# --- SHARED PARAMETERS ---
parameters:
  - name: id
    in: path
    required: true
    description: ID único da notificação base.
    schema:
      type: integer
      example: 1042

# --- GET METHOD ---
get:
  summary: Buscar detalhes da notificação de Dengue
  description: Retorna os dados completos (gerais + clínicos) de uma notificação específica.
  operationId: detalharDengue
  tags:
    - Notificações (Agravos Específicos)
  security: []
  # --- RESPONSES ---
  responses:
    # --- OK STATUS 200 ---
    "200":
      description: Detalhes recuperados com sucesso.
      content:
        application/json:
          schema:
            type: object
            properties:
              # Base Table Fields
              id: { type: integer, example: 1042 }
              patient_id: { type: integer, example: 105 }
              unit_id: { type: integer, example: 12 }
              user_id: { type: integer, example: 3 }
              status: { type: string, example: "confirmado" }
              notification_type_slug: { type: string, example: "dengue" }
              notification_date:
                { type: string, format: date, example: "2026-06-25" }
              occurrence_date:
                { type: string, format: date, example: "2026-06-20" }
              notes: { type: string, example: "Paciente internado." }
              created_at:
                {
                  type: string,
                  format: date-time,
                  example: "2026-06-25T14:30:00Z",
                }
              # Child Table Fields
              st_fever: { type: string, example: "sim" }
              st_arthralgia_intense: { type: string, example: "sim" }
              st_result_chik_s1: { type: string, example: "nao_realizado" }
              st_result_ns1: { type: string, example: "reagente" }
              tp_classification:
                { type: string, example: "dengue_com_sinais_de_alarme" }
              st_shock: { type: string, example: "nao" }
    # --- NOT FOUND STATUS 404 ---
    "404":
      description: Notificação não encontrada.

# --- PUT METHOD ---
put:
  summary: Atualizar notificação de Dengue
  description: Sobrescreve os dados de uma notificação existente.
  operationId: atualizarDengue
  tags:
    - Notificações (Agravos Específicos)
  security: []
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          required:
            - status
          properties:
            # Base Table Fields
            unit_id: { type: integer, example: 12 }
            user_id: { type: integer, example: 3 }
            status: { type: string, example: "confirmado" }
            notification_type_slug: { type: string, example: "dengue" }
            notification_date:
              { type: string, format: date, example: "2026-06-25" }
            occurrence_date:
              { type: string, format: date, example: "2026-06-20" }
            notes: { type: string, example: "Paciente internado." }
            # Child Table Fields
            st_fever: { type: string, example: "sim" }
            st_arthralgia_intense: { type: string, example: "sim" }
            st_result_chik_s1: { type: string, example: "nao_realizado" }
            st_result_ns1: { type: string, example: "reagente" }
            tp_classification:
              { type: string, example: "dengue_com_sinais_de_alarme" }
            st_shock: { type: string, example: "nao" }
  responses:
    # --- OK STATUS 200 ---
    "200":
      description: Notificação atualizada com sucesso.
    # --- BAD REQUEST STATUS 400 ---
    "400":
      description: Erro de validação nos dados enviados.
    # --- NOT FOUND STATUS 404 ---
    "404":
      description: Notificação não encontrada.

# --- DELETE METHOD ---
delete:
  summary: Excluir notificação de Dengue
  description: Remove a notificação do sistema (ou marca como inativa).
  operationId: deletarDengue
  tags:
    - Notificações (Agravos Específicos)
  security: []
  responses:
    # --- NO CONTENT STATUS 204 ---
    "204":
      description: Notificação excluída com sucesso (Sem conteúdo de retorno).
    # --- NOT FOUND STATUS 404 ---
    "404":
      description: Notificação não encontrada.
