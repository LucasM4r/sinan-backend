# ENDPOINT: /units/{id}

# --- SHARED PARAMETERS ---
parameters:
  - name: id
    in: path
    required: true
    description: ID único da unidade de saúde.
    schema:
      type: integer
      example: 12

# --- GET METHOD ---
get:
  summary: Buscar detalhes da unidade
  description: Retorna os dados de uma unidade de saúde específica pelo seu ID.
  operationId: detalharUnidade
  tags:
    - Unidades
  responses:
    "200":
      description: Unidade recuperada com sucesso.
      content:
        application/json:
          schema:
            $ref: "../components/schemas.yaml#/UnitResponse"
    "401":
      $ref: "../components/errors.yaml#/responses/401"
    "404":
      $ref: "../components/errors.yaml#/responses/404"
    "500":
      $ref: "../components/errors.yaml#/responses/500"

# --- PUT METHOD ---
put:
  summary: Atualizar unidade
  description: Altera os dados de uma unidade de saúde existente.
  operationId: atualizarUnidade
  tags:
    - Unidades
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: "../components/schemas.yaml#/UnitCreateRequest"
  responses:
    "200":
      description: Unidade atualizada com sucesso. Retorna os novos dados.
      content:
        application/json:
          schema:
            $ref: "../components/schemas.yaml#/UnitResponse"
    "400":
      $ref: "../components/errors.yaml#/responses/400"
    "401":
      $ref: "../components/errors.yaml#/responses/401"
    "404":
      $ref: "../components/errors.yaml#/responses/404"
    "500":
      $ref: "../components/errors.yaml#/responses/500"

# --- DELETE METHOD ---
delete:
  summary: Excluir unidade
  description: Remove uma unidade de saúde do sistema (exclusão lógica recomendada).
  operationId: deletarUnidade
  tags:
    - Unidades
  responses:
    "204":
      description: Unidade excluída com sucesso (Sem conteúdo de retorno).
    "401":
      $ref: "../components/errors.yaml#/responses/401"
    "404":
      $ref: "../components/errors.yaml#/responses/404"
    "500":
      $ref: "../components/errors.yaml#/responses/500"
