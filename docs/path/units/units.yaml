# ENDPOINT: /units

# --- GET METHOD ---
get:
  summary: Listar unidades de saúde
  description: Retorna uma lista paginada com todas as unidades cadastradas no sistema.
  operationId: listarUnidades
  tags:
    - Unidades
  parameters:
    - $ref: "../components/parameters.yaml#/PageParam"
    - $ref: "../components/parameters.yaml#/PageSizeParam"
    - $ref: "../components/parameters.yaml#/SearchParam"
  responses:
    # --- SUCCESS RESPONSE ---
    "200":
      description: Lista de unidades recuperada com sucesso.
      content:
        application/json:
          schema:
            $ref: "../components/schemas.yaml#/PaginatedUnitList"
    # --- UNAUTHORIZED ACCESS RESPONSE ---
    "401":
      $ref: "../components/errors.yaml#/responses/401"
    # --- INTERNAL SERVER ERROR RESPONSE ---
    "500":
      $ref: "../components/errors.yaml#/responses/500"

# --- POST METHOD ---
post:
  summary: Cadastrar nova unidade
  description: Cria uma nova unidade de saúde no banco de dados.
  operationId: criarUnidade
  tags:
    - Unidades
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: "../components/schemas.yaml#/UnitCreateRequest"
  responses:
    # --- CREATED RESPONSE ---
    "201":
      description: Unidade criada com sucesso.
      content:
        application/json:
          schema:
            $ref: "../components/schemas.yaml#/UnitResponse"
    # --- BAD REQUEST RESPONSE ---
    "400":
      $ref: "../components/errors.yaml#/responses/400"
    # --- UNAUTHORIZED ACCESS RESPONSE ---
    "401":
      $ref: "../components/errors.yaml#/responses/401"
    # --- INTERNAL SERVER ERROR RESPONSE ---
    "500":
      $ref: "../components/errors.yaml#/responses/500"
