# --- SHARED PARAMETERS ---
parameters:
  - name: id
    in: path
    required: true
    description: ID único do paciente.
    schema:
      type: integer
      example: 105

# --- GET METHOD ---
get:
  summary: Buscar detalhes do paciente
  description: Retorna os dados de um paciente específico pelo seu ID.
  operationId: detalharPaciente
  tags:
    - Pacientes
  responses:
    "200":
      description: Dados do paciente recuperados com sucesso.
      content:
        application/json:
          schema:
            $ref: "../components/schemas.yaml#/PatientResponse"
    "401":
      $ref: "../components/errors.yaml#/responses/401"
    "404":
      $ref: "../components/errors.yaml#/responses/404"
    "500":
      $ref: "../components/errors.yaml#/responses/500"

# --- PUT METHOD ---
put:
  summary: Alterar dados do paciente
  description: Altera os dados cadastrais de um paciente existente.
  operationId: atualizarPaciente
  tags:
    - Pacientes
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: "../components/schemas.yaml#/PatientUpdateRequest"
  responses:
    "200":
      description: Paciente atualizado com sucesso.
      content:
        application/json:
          schema:
            $ref: "../components/schemas.yaml#/PatientResponse"
    "400":
      $ref: "../components/errors.yaml#/responses/400"
    "401":
      $ref: "../components/errors.yaml#/responses/401"
    "404":
      $ref: "../components/errors.yaml#/responses/404"
    "500":
      $ref: "../components/errors.yaml#/responses/500"

# --- DELETE METHOD ---
delete:
  summary: Excluir paciente
  description: Remove um paciente do sistema.
  operationId: deletarPaciente
  tags:
    - Pacientes
  responses:
    "204":
      description: Paciente excluído com sucesso (Sem conteúdo de retorno).
    "401":
      $ref: "../components/errors.yaml#/responses/401"
    "404":
      $ref: "../components/errors.yaml#/responses/404"
    "500":
      $ref: "../components/errors.yaml#/responses/500"
