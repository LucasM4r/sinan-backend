# --- GET METHOD ---
get:
  summary: Listar pacientes
  description: Retorna uma lista paginada com todos os pacientes cadastrados no sistema.
  operationId: listarPacientes
  tags:
    - Pacientes
  security: []
  responses:
    "200":
      description: Lista de pacientes recuperada com sucesso.
      content:
        application/json:
          schema:
            type: object
            properties:
              count:
                type: integer
                description: Total de registros encontrados.
                example: 105
              next:
                type: string
                nullable: true
                description: URL para a próxima página de resultados.
                example: "https://api.sinan.gov.br/api/v1/patients?page=2"
              previous:
                type: string
                nullable: true
                description: URL para a página anterior de resultados.
                example: null
              results:
                type: array
                items:
                  $ref: "../components/schemas.yaml#/components/schemas/PatientResponse"
    "404":
      description: Nenhum paciente encontrado.
      content:
        application/json:
          schema:
            $ref: "../components/schemas.yaml#/components/schemas/ErrorResponse"

# --- POST METHOD ---
post:
  summary: Cadastrar novo paciente
  description: Registra um novo paciente no banco de dados.
  operationId: criarPaciente
  tags:
    - Pacientes
  security: []
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: "../components/schemas.yaml#/components/schemas/PatientCreateRequest"
  responses:
    "201":
      description: Paciente criado com sucesso.
      content:
        application/json:
          schema:
            $ref: "../components/schemas.yaml#/components/schemas/PatientResponse"
    "400":
      description: "Erro de validação nos dados enviados (ex: CPF já cadastrado ou inválido)."
      content:
        application/json:
          schema:
            $ref: "../components/schemas.yaml#/components/schemas/ErrorResponse"
