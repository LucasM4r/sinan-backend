post:
  summary: Autenticação de usuários no sistema SINAN.
  description: >
    Endpoint para autenticação de usuários no sistema SINAN. Recebe credenciais de
    login e retorna um token de acesso válido para uso em chamadas subsequentes à API.
  tags:
    - Autenticação
  operationId: loginUsuario
  security: []
  requestBody:
    $ref: "../components/auth.yaml#/LoginRequest"
  responses:
    # --- SUCCESS RESPONSE ---
    "200":
      $ref: "../components/auth.yaml#/LoginResponse"
    # --- BAD REQUEST ERROR RESPONSE ---
    "400":
      $ref: "../components/errors.yaml#/responses/400"
    # --- UNAUTHORIZED ERROR RESPONSE ---
    "401":
      $ref: "../components/errors.yaml#/responses/401"
    # --- FORBIDDEN ERROR RESPONSE ---
    "403":
      $ref: "../components/errors.yaml#/responses/403"
    # --- UNPROCESSABLE ENTITY ERROR RESPONSE ---
    "422":
      $ref: "../components/errors.yaml#/responses/422"
    # --- SERVER ERROR RESPONSE ---
    "500":
      $ref: "../components/errors.yaml#/responses/500"
